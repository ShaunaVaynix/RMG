{% extends "base2.html" %}
{% block title %}Register{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="glass-card">
            <h3 class="text-center mb-4 fw-bold">Create Account</h3>
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" name="first_name" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-control" required>
                </div>
                <div class="mb-3 position-relative">
                    <label class="form-label">Password</label>
                    <input type="password" name="password1" id="reg-password1" class="form-control" required>
                    <i class="bi bi-eye position-absolute" style="top:38px; right:10px;"
                       onclick="togglePassword('reg-password1','reg-eye1')" id="reg-eye1"></i>
                </div>
                <div class="mb-3 position-relative">
                    <label class="form-label">Confirm Password</label>
                    <input type="password" name="password2" id="reg-password2" class="form-control" required>
                    <i class="bi bi-eye position-absolute" style="top:38px; right:10px;"
                       onclick="togglePassword('reg-password2','reg-eye2')" id="reg-eye2"></i>
                </div>
                <button type="submit" class="btn btn-primary w-100">Register</button>
            </form>
            <div class="text-center mt-3">
                <small>Already have an account? <a href="{% url 'login' %}">Login here</a></small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
