{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}PC Shop{% endblock %}</title>

<!-- Bootstrap CSS & Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<!-- SweetAlert2 -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<!-- Custom CSS -->
<link rel="stylesheet" href="{% static 'css/dashboard.css' %}">

<style>
html, body {
    height: 100%;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #0f172a;
    color: #fff;
    margin: 0;
    padding: 0;
}

/* Main Content Wrapper */
.main-content {
    width: 100%;
    min-height: 100vh;
    overflow-y: auto;
}

/* Cards */
.card {
    background: #1e293b;
    color: #fff;
    border: none;
    border-radius: 12px;
}
.card-body h6 {
    opacity: 0.7;
}

/* Floor Grid & Tiles */
.floor-grid {
    display: grid;
    grid-template-columns: repeat(20, 1fr);
    gap: 2px;
    min-height: 300px;
}
.tile {
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    cursor: pointer;
    user-select: none;
    height: 30px;
    width: 100%;
    border: 1px solid #495057;
    transition: transform 0.1s;
}
.tile:hover {
    transform: scale(1.05);
}

/* Tile Colors */
.empty { background: #212529; }
.vip { background: #f59e0b; }
.gaming { background: #3b82f6; }
.streaming { background: #10b981; }
.regular { background: #9ca3af; }
.wall { background: #000814; }
.walk { background: #475569; }
</style>
</head>
<body>

<!-- Main Content -->
<div class="main-content">
    {% block content %}{% endblock %}
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- SweetAlert Messages -->
{% if messages %}
<div id="django-messages" style="display:none">
[
{% for message in messages %}
    {"tags": "{{ message.tags }}", "message": "{{ message|escapejs|striptags }}"}{% if not forloop.last %},{% endif %}
{% endfor %}
]
</div>
<script>
const djangoMessages = JSON.parse(document.getElementById('django-messages').textContent);
djangoMessages.forEach(msg => {
    Swal.fire({
        icon: msg.tags.includes('success') ? 'success' : 'error',
        title: msg.message,
        timer: 2500,
        timerProgressBar: true,
        showConfirmButton: false
    });
});
</script>
{% endif %}

</body>
</html>
